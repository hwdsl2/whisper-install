name: test_set_2

on: workflow_call

jobs:
  test_set_2:
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test
        run: |
          set -ex

          cd "$GITHUB_WORKSPACE"
          ls -ld whisper-install.sh

          cp -f whisper-install.sh ./whisper.sh

          sudo bash whisper.sh --auto

          sudo systemctl status whisper.service
          sudo test -f /etc/whisper/whisper.conf
          sudo test -f /opt/whisper/api_server.py
          sudo test -d /opt/whisper/venv
          sudo grep -q 'WHISPER_MODEL=base' /etc/whisper/whisper.conf
          sudo grep -q 'WHISPER_PORT=9000' /etc/whisper/whisper.conf
          sudo grep -q 'WHISPER_LISTEN_ADDR=0.0.0.0' /etc/whisper/whisper.conf

          sudo bash whisper.sh --showinfo
          sudo bash whisper.sh --listmodels
          sudo bash whisper.sh --listmodels | grep -q 'base'
          sudo bash whisper.sh --listmodels | grep -q 'large-v3-turbo'

          sudo bash whisper.sh --uninstall --yes

          sudo test -f /etc/systemd/system/whisper.service && exit 1
          sudo test -f /etc/whisper/whisper.conf && exit 1
          sudo test -d /opt/whisper && exit 1

          # Test --auto with custom model and port
          sudo bash whisper.sh --auto --model tiny --port 9001

          sudo systemctl status whisper.service
          sudo grep -q 'WHISPER_MODEL=tiny' /etc/whisper/whisper.conf
          sudo grep -q 'WHISPER_PORT=9001' /etc/whisper/whisper.conf

          sudo bash whisper.sh --uninstall --yes

          sudo test -f /etc/whisper/whisper.conf && exit 1

          # Test --listenaddr option
          sudo bash whisper.sh --auto --listenaddr 127.0.0.1

          sudo systemctl status whisper.service
          sudo grep -q 'WHISPER_LISTEN_ADDR=127.0.0.1' /etc/whisper/whisper.conf

          sudo bash whisper.sh --uninstall --yes

          sudo test -f /etc/whisper/whisper.conf && exit 1

          exit 0
