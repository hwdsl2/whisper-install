name: test_set_1

on: workflow_call

jobs:
  test_set_1:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        os_version: ["centos:10s", "centos:9s", "almalinux:10", "almalinux:9"]
      fail-fast: false
    env:
      OS_VERSION: ${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"
          cd "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"

          mkdir -p scripts
          ls -ld "$GITHUB_WORKSPACE/whisper-install.sh"
          cp -f "$GITHUB_WORKSPACE"/*.sh scripts/

          cat > run.sh <<'EOF'
          #!/bin/bash
          set -eEx

          trap 'catch $? $LINENO' ERR

          catch() {
            echo "Error $1 occurred on line $2."
            cat -n -- "$0" | tail -n+"$(($2 - 3))" | head -n7
            exit 1
          }

          cd /opt/src
          if grep -qs -i rocky /etc/redhat-release; then
            yum -y -q update
          fi
          yum -y -q install wget

          cp -f /opt/src/scripts/whisper-install.sh ./whisper.sh

          bash whisper.sh --auto

          systemctl status whisper.service
          test -f /etc/whisper/whisper.conf
          test -f /opt/whisper/api_server.py
          test -d /opt/whisper/venv
          grep -q 'WHISPER_MODEL=base' /etc/whisper/whisper.conf
          grep -q 'WHISPER_PORT=9000' /etc/whisper/whisper.conf
          grep -q 'WHISPER_LISTEN_ADDR=0.0.0.0' /etc/whisper/whisper.conf

          bash whisper.sh --showinfo
          bash whisper.sh --listmodels
          bash whisper.sh --listmodels | grep -q 'base'
          bash whisper.sh --listmodels | grep -q 'large-v3-turbo'

          bash whisper.sh --uninstall --yes

          test -f /etc/systemd/system/whisper.service && exit 1
          test -f /etc/whisper/whisper.conf && exit 1
          test -d /opt/whisper && exit 1

          # Test --auto with custom model and port
          bash whisper.sh --auto --model tiny --port 9001

          systemctl status whisper.service
          grep -q 'WHISPER_MODEL=tiny' /etc/whisper/whisper.conf
          grep -q 'WHISPER_PORT=9001' /etc/whisper/whisper.conf

          bash whisper.sh --uninstall --yes

          test -f /etc/whisper/whisper.conf && exit 1

          # Test --listenaddr option
          bash whisper.sh --auto --listenaddr 127.0.0.1

          systemctl status whisper.service
          grep -q 'WHISPER_LISTEN_ADDR=127.0.0.1' /etc/whisper/whisper.conf

          bash whisper.sh --uninstall --yes

          test -f /etc/whisper/whisper.conf && exit 1

          exit 0
          EOF

          if [ "$OS_VERSION" = "centos:9s" ]; then
            echo "FROM quay.io/centos/centos:stream9" > Dockerfile
          elif [ "$OS_VERSION" = "centos:10s" ]; then
            echo "FROM quay.io/centos/centos:stream10" > Dockerfile
          else
            echo "FROM $OS_VERSION" > Dockerfile
          fi

          cat >> Dockerfile <<'EOF'

          ENV container=docker
          WORKDIR /opt/src
          EOF

          if [ "$OS_VERSION" = "centos:9s" ] || [ "$OS_VERSION" = "centos:10s" ]; then
            echo "RUN yum -y -q install systemd" >> Dockerfile
          fi
          if [ "$OS_VERSION" = "almalinux:9" ] || [ "$OS_VERSION" = "centos:9s" ]; then
            echo "RUN yum -y -q swap curl-minimal curl" >> Dockerfile
          fi

          cat >> Dockerfile <<'EOF'
          RUN (cd /lib/systemd/system/sysinit.target.wants/; for i in *; do [ "$i" = \
          systemd-tmpfiles-setup.service ] || rm -f "$i"; done); \
          rm -f /lib/systemd/system/multi-user.target.wants/*; \
          rm -f /etc/systemd/system/*.wants/*; \
          rm -f /lib/systemd/system/local-fs.target.wants/*; \
          rm -f /lib/systemd/system/sockets.target.wants/*udev*; \
          rm -f /lib/systemd/system/sockets.target.wants/*initctl*; \
          rm -f /lib/systemd/system/basic.target.wants/*; \
          rm -f /lib/systemd/system/anaconda.target.wants/*;

          COPY scripts/ /opt/src/scripts/
          COPY ./run.sh /opt/src/run.sh
          RUN chmod 755 /opt/src/run.sh

          VOLUME [ "/sys/fs/cgroup" ]

          CMD ["/sbin/init"]
          EOF
          cat Dockerfile
          cat run.sh
          docker build -t "${OS_VERSION//:}-test" .

      - name: Test
        run: |
          docker run -d --name "${OS_VERSION//:}-test-1" -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --cgroupns=host --privileged "${OS_VERSION//:}-test"
          sleep 5
          docker exec "${OS_VERSION//:}-test-1" /opt/src/run.sh

      - name: Clear
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE/testing/${OS_VERSION//:}"
          docker rm -f "${OS_VERSION//:}-test-1" || true
          docker rmi "${OS_VERSION//:}-test" || true